<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Strength Dashboard</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #100e16; --surface: #18151f; --border: #261f33;
      --accent: #f59e0b; --accent2: #fbbf24; --text: #ede9f6;
      --muted: #7c6d8c; --green: #4ade80; --red: #f87171; --purple: #a78bfa;
    }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; padding: 24px; }
    header { margin-bottom: 28px; }
    header h1 { font-size: 1.6rem; font-weight: 700; }
    header p  { color: var(--muted); font-size: 0.85rem; margin-top: 4px; }
    .kpi-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 14px; margin-bottom: 28px; }
    .kpi { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 18px 20px; }
    .kpi-label { font-size: 0.72rem; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 6px; }
    .kpi-value { font-size: 1.8rem; font-weight: 700; color: var(--accent2); line-height: 1; }
    .kpi-sub   { font-size: 0.78rem; color: var(--muted); margin-top: 6px; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 20px; }
    .card-title { font-size: 0.78rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 16px; }
    .chart-wrap { position: relative; height: 340px; }
    .ex-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 14px; }
    .ex-card { background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; }
    .ex-name { font-size: 0.95rem; font-weight: 600; margin-bottom: 2px; }
    .ex-mg   { font-size: 0.72rem; color: var(--purple); background: rgba(167,139,250,.12); border-radius: 4px; padding: 2px 7px; display: inline-block; margin-bottom: 10px; }
    .ex-best { font-size: 1.4rem; font-weight: 700; color: var(--accent); }
    .ex-best small { font-size: 0.85rem; font-weight: 400; color: var(--muted); }
    .rep-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-top: 10px; }
    .rep-cell { text-align: center; background: var(--surface); border-radius: 6px; padding: 5px 4px; }
    .rep-label { font-size: 0.65rem; color: var(--muted); }
    .rep-val   { font-size: 0.82rem; font-weight: 600; color: var(--text); margin-top: 1px; }
    .rep-val.best { color: var(--accent2); }
    .loading { display: flex; align-items: center; justify-content: center; height: 160px; color: var(--muted); font-size: 0.9rem; gap: 10px; }
    .spinner { width: 18px; height: 18px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .err { color: var(--red); padding: 20px; text-align: center; font-size: 0.9rem; }
  </style>
</head>
<body>
  <header>
    <h1>💪 Strength Dashboard</h1>
    <p id="subtitle">Loading from Notion…</p>
  </header>

  <div class="kpi-row" id="kpis">
    <div class="loading"><span class="spinner"></span> Fetching data…</div>
  </div>

  <div class="card">
    <div class="card-title">Top 15 Exercises — Best Weight (kg)</div>
    <div class="chart-wrap"><canvas id="barChart"></canvas></div>
  </div>

  <div class="card">
    <div class="card-title">Per-Exercise PRs &amp; Rep Ranges</div>
    <div class="ex-grid" id="exGrid">
      <div class="loading"><span class="spinner"></span></div>
    </div>
  </div>

  <script>
    const API = '/api/notion?action=dashboard-strength';

    const MG_COLORS = {
      'Chest': '#f59e0b', 'Back': '#6366f1', 'Shoulders': '#10b981',
      'Biceps': '#f43f5e', 'Triceps': '#8b5cf6', 'Legs': '#3b82f6',
      'Quadriceps': '#06b6d4', 'Hamstrings': '#84cc16', 'Calves': '#14b8a6',
      'Glutes': '#ec4899', 'Abs': '#f97316', 'Core': '#f97316',
      'Lower Back': '#a78bfa', 'Traps': '#fb923c',
    };
    const mgColor = mg => MG_COLORS[mg] || '#a78bfa';

    function renderKPIs({ exercises }) {
      const heaviest = exercises.length > 0 ? exercises[0] : null;
      const totalPRs = exercises.filter(e => Object.keys(e.repMaxes).length > 0).length;
      const avgBest  = exercises.length > 0
        ? (exercises.reduce((s, e) => s + e.bestWeight, 0) / exercises.length).toFixed(1)
        : '—';
      document.getElementById('kpis').innerHTML = `
        <div class="kpi">
          <div class="kpi-label">Top Exercise</div>
          <div class="kpi-value" style="font-size:1.1rem">${heaviest ? heaviest.name : '—'}</div>
          <div class="kpi-sub">${heaviest ? heaviest.bestWeight + ' kg best' : ''}</div>
        </div>
        <div class="kpi">
          <div class="kpi-label">Exercises Tracked</div>
          <div class="kpi-value">${exercises.length}</div>
          <div class="kpi-sub">with recorded weight</div>
        </div>
        <div class="kpi">
          <div class="kpi-label">Avg Best Weight</div>
          <div class="kpi-value">${avgBest}<small style="font-size:1rem;font-weight:400"> kg</small></div>
          <div class="kpi-sub">across top ${exercises.length}</div>
        </div>
        <div class="kpi">
          <div class="kpi-label">With Rep Data</div>
          <div class="kpi-value">${totalPRs}</div>
          <div class="kpi-sub">exercises with PRs</div>
        </div>`;
    }

    function renderBarChart({ exercises }) {
      const labels = exercises.map(e => e.name);
      const values = exercises.map(e => e.bestWeight);
      const colors = exercises.map(e => mgColor(e.muscleGroup));

      new Chart(document.getElementById('barChart'), {
        type: 'bar',
        data: {
          labels,
          datasets: [{
            data: values,
            backgroundColor: colors.map(c => c + '55'),
            borderColor: colors,
            borderWidth: 1.5,
            borderRadius: 5,
          }],
        },
        options: {
          indexAxis: 'y',
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: false },
            tooltip: {
              backgroundColor: '#1e1a28', borderColor: '#261f33', borderWidth: 1,
              titleColor: '#ede9f6', bodyColor: '#7c6d8c',
              callbacks: {
                label: c => ` ${c.raw} kg`,
                afterLabel: c => ` ${exercises[c.dataIndex].muscleGroup}`,
              },
            },
          },
          scales: {
            x: { ticks: { color: '#7c6d8c', callback: v => v + ' kg' }, grid: { color: '#261f33' } },
            y: { ticks: { color: '#ede9f6', font: { size: 11 } }, grid: { color: '#261f33' } },
          },
        },
      });
    }

    function renderExGrid({ exercises }) {
      if (!exercises.length) { document.getElementById('exGrid').innerHTML = '<p class="err">No exercises found.</p>'; return; }
      document.getElementById('exGrid').innerHTML = exercises.map(ex => {
        const recordedReps = Object.keys(ex.repMaxes).map(Number).sort((a, b) => a - b);
        const repCells = recordedReps.map(r => {
          const v = ex.repMaxes[r];
          const isBest = v === ex.bestWeight;
          return `<div class="rep-cell"><div class="rep-label">${r}RM</div><div class="rep-val${isBest ? ' best' : ''}">${v} kg</div></div>`;
        }).join('');
        return `<div class="ex-card">
          <div class="ex-name">${ex.name}</div>
          <span class="ex-mg">${ex.muscleGroup}</span>
          <div class="ex-best">${ex.bestWeight} <small>kg best</small></div>
          ${recordedReps.length > 0 ? `<div class="rep-grid">${repCells}</div>` : ''}
        </div>`;
      }).join('');
    }

    async function init() {
      try {
        const res = await fetch(API);
        if (!res.ok) throw new Error(`API ${res.status}`);
        const data = await res.json();
        document.getElementById('subtitle').textContent =
          `Top ${data.exercises.length} exercises by best weight · live from Notion`;
        renderKPIs(data);
        renderBarChart(data);
        renderExGrid(data);
      } catch (err) {
        document.getElementById('kpis').innerHTML = `<p class="err">Failed to load: ${err.message}</p>`;
        document.getElementById('exGrid').innerHTML = '';
      }
    }
    init();
  </script>
</body>
</html>
