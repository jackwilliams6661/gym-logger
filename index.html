<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Gym Logger">
  <meta name="theme-color" content="#111111">
  <title>Gym Logger 💪</title>
  <style>
    /* ── Reset & Base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html { font-size: 16px; }
    body {
      background: #111;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100dvh;
      overscroll-behavior: none;
    }

    /* ── Views ── */
    .view { display: none; flex-direction: column; min-height: 100dvh; }
    .view.active { display: flex; }

    /* ── Header ── */
    .header {
      padding: env(safe-area-inset-top, 12px) 16px 12px;
      padding-top: max(env(safe-area-inset-top, 12px), 12px);
      background: #111;
      position: sticky; top: 0; z-index: 20;
      border-bottom: 1px solid #1e1e1e;
    }
    .back-btn {
      background: none; border: none; color: #ff6b35;
      font-size: 16px; font-weight: 600; cursor: pointer;
      padding: 0; margin-bottom: 6px; display: flex; align-items: center; gap: 4px;
    }
    .header h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.3px; }
    .header-sub { font-size: 13px; color: #666; margin-top: 3px; }

    /* ── Scrollable Content ── */
    .content { flex: 1; padding: 16px; overflow-y: auto; -webkit-overflow-scrolling: touch; }

    /* ── Bottom Bar ── */
    .bottom-bar {
      padding: 12px 16px;
      padding-bottom: max(env(safe-area-inset-bottom, 12px), 12px);
      background: #111;
      border-top: 1px solid #1e1e1e;
      position: sticky; bottom: 0;
      display: flex; flex-direction: column; gap: 8px;
    }

    /* ── Buttons ── */
    .btn { border: none; border-radius: 14px; cursor: pointer; font-weight: 700; transition: transform 0.1s, background 0.1s; }
    .btn:active { transform: scale(0.97); }
    .btn-primary { background: #ff6b35; color: #fff; padding: 19px; font-size: 17px; width: 100%; }
    .btn-primary:disabled { background: #3a2820; color: #7a4a38; }
    .btn-secondary {
      background: #1e1e1e; color: #fff; padding: 15px; font-size: 15px; width: 100%;
      border: 1.5px solid #333;
    }
    .btn-danger { background: #1e1e1e; color: #ff4444; border: 1.5px solid #ff4444; padding: 15px; font-size: 15px; width: 100%; }
    .btn-row { display: flex; gap: 10px; }
    .btn-row .btn { flex: 1; }

    /* ── Cards ── */
    .card { background: #1a1a1a; border-radius: 14px; border: 1.5px solid #2a2a2a; }
    .card-sm { padding: 14px 16px; }
    .card-md { padding: 18px 16px; }

    /* ── Muscle Grid ── */
    .muscle-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .muscle-btn {
      padding: 22px 10px; background: #1a1a1a; border: 2px solid #2a2a2a; border-radius: 14px;
      font-size: 16px; font-weight: 700; color: #ddd; cursor: pointer;
      text-align: center; line-height: 1.3; transition: all 0.15s;
    }
    .muscle-btn .emoji { font-size: 26px; display: block; margin-bottom: 6px; }
    .muscle-btn.selected { background: #2a1a0e; border-color: #ff6b35; color: #ff6b35; }
    .muscle-btn:active { transform: scale(0.97); }

    /* ── Exercise List ── */
    .exercise-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 16px; background: #1a1a1a; border-radius: 12px;
      border: 1.5px solid #2a2a2a; cursor: pointer; margin-bottom: 8px; transition: all 0.15s;
    }
    .exercise-item .ex-name { font-size: 16px; font-weight: 600; }
    .exercise-item .ex-muscle { font-size: 12px; color: #666; margin-top: 2px; }
    .exercise-item .check { font-size: 22px; transition: all 0.15s; }
    .exercise-item.added { border-color: #4caf50; background: #0e1e0e; }
    .exercise-item.added .check { color: #4caf50; }
    .exercise-item:not(.added) .check { color: #333; }
    .exercise-item:active { transform: scale(0.98); }

    /* ── Exercise Tabs ── */
    .ex-tabs {
      display: flex; gap: 8px; overflow-x: auto; padding: 0 16px 12px;
      -webkit-overflow-scrolling: touch; scrollbar-width: none;
    }
    .ex-tabs::-webkit-scrollbar { display: none; }
    .ex-tab {
      flex-shrink: 0; padding: 8px 16px; border-radius: 20px; border: none; cursor: pointer;
      font-size: 13px; font-weight: 700; white-space: nowrap; transition: all 0.15s;
    }
    .ex-tab.active { background: #ff6b35; color: #fff; }
    .ex-tab.inactive { background: #1e1e1e; color: #888; }
    .ex-tab .tab-count {
      display: inline-flex; align-items: center; justify-content: center;
      width: 18px; height: 18px; border-radius: 50%; font-size: 11px;
      margin-left: 4px;
    }
    .ex-tab.active .tab-count { background: rgba(255,255,255,0.3); color: #fff; }
    .ex-tab.inactive .tab-count { background: #333; color: #aaa; }

    /* ── Set Logger ── */
    .ex-label { font-size: 12px; color: #666; text-transform: uppercase; letter-spacing: 0.8px; font-weight: 600; margin-bottom: 8px; }
    .ex-name-large { font-size: 24px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 4px; }
    .set-badge {
      display: inline-flex; align-items: center; background: #ff6b35;
      color: #fff; font-size: 12px; font-weight: 700; padding: 3px 10px;
      border-radius: 20px; margin-bottom: 20px;
    }

    .stepper-card { background: #1a1a1a; border-radius: 16px; border: 1.5px solid #2a2a2a; padding: 16px 14px; margin-bottom: 12px; }
    .stepper-label { font-size: 11px; color: #555; text-transform: uppercase; letter-spacing: 0.8px; font-weight: 700; margin-bottom: 14px; }
    .stepper { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .step-btn {
      width: 68px; height: 68px; border-radius: 14px; border: none; cursor: pointer;
      font-size: 26px; font-weight: 700; display: flex; align-items: center; justify-content: center;
      transition: transform 0.1s;
    }
    .step-btn:active { transform: scale(0.9); }
    .step-btn.minus { background: #252525; color: #ff6b35; }
    .step-btn.plus { background: #ff6b35; color: #fff; }
    .step-btn.sm { width: 44px; height: 44px; font-size: 18px; border-radius: 10px; }
    .step-display {
      flex: 1; text-align: center; cursor: pointer;
    }
    .step-value { font-size: 42px; font-weight: 800; letter-spacing: -1px; line-height: 1; }
    .step-unit { font-size: 13px; color: #555; margin-top: 2px; }
    .step-fine { display: flex; gap: 6px; justify-content: center; margin-top: 10px; }

    /* ── Logged Sets ── */
    .sets-area { margin-top: 20px; }
    .sets-title { font-size: 11px; color: #555; text-transform: uppercase; letter-spacing: 0.8px; font-weight: 700; margin-bottom: 10px; }
    .sets-grid { display: flex; flex-wrap: wrap; gap: 8px; }
    .set-pill {
      display: flex; align-items: center; gap: 6px;
      background: #1a1a1a; border: 1.5px solid #2a2a2a; border-radius: 10px;
      padding: 8px 12px; font-size: 14px;
    }
    .set-pill .sn { font-size: 11px; color: #555; font-weight: 700; }
    .set-pill.fresh { border-color: #4caf50; background: #0e1e0e; }

    /* ── Progress bar ── */
    .workout-meta { display: flex; gap: 16px; padding: 10px 16px; background: #1a1a1a; border-bottom: 1px solid #222; }
    .meta-item { font-size: 13px; color: #666; }
    .meta-item strong { color: #fff; font-size: 15px; }

    /* ── Summary ── */
    .summary-exercise { margin-bottom: 12px; }
    .summary-ex-name { font-size: 17px; font-weight: 700; margin-bottom: 6px; }
    .summary-sets { display: flex; flex-wrap: wrap; gap: 6px; }
    .summary-pill {
      background: #1a1a1a; border: 1.5px solid #2a2a2a; border-radius: 8px;
      padding: 6px 10px; font-size: 13px; color: #ccc;
    }

    /* ── Home ── */
    .home-date { font-size: 15px; color: #555; margin-bottom: 24px; }
    .active-banner {
      background: #0e1e0e; border: 1.5px solid #4caf50; border-radius: 14px;
      padding: 14px 16px; margin-bottom: 20px; cursor: pointer;
    }
    .active-banner .ab-label { font-size: 11px; color: #4caf50; font-weight: 700; letter-spacing: 0.8px; text-transform: uppercase; margin-bottom: 4px; }
    .active-banner .ab-name { font-size: 17px; font-weight: 700; }
    .active-banner .ab-meta { font-size: 13px; color: #666; margin-top: 2px; }

    /* ── History ── */
    .history-item { padding: 14px 16px; margin-bottom: 8px; cursor: pointer; }
    .history-item:active { opacity: 0.75; }
    .history-item .h-row { display: flex; align-items: center; justify-content: space-between; }
    .history-item .h-name { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
    .history-item .h-meta { font-size: 13px; color: #666; }
    .history-item .h-arrow { font-size: 18px; color: #555; flex-shrink: 0; margin-left: 10px; }

    /* ── Workout Detail ── */
    .detail-exercise { margin-bottom: 18px; }
    .detail-ex-name { font-size: 17px; font-weight: 700; margin-bottom: 8px; }
    .detail-ex-total { font-size: 12px; color: #666; margin-top: 6px; }
    .resume-warn { background: #1a1500; border: 1.5px solid #ffb300; border-radius: 12px; padding: 12px 14px; margin-bottom: 16px; font-size: 13px; color: #ffb300; }

    /* ── Toggle Chips (BW / NA / Time) ── */
    .toggle-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
    .toggle-chip {
      padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 700;
      cursor: pointer; border: 1.5px solid #333; background: #1a1a1a; color: #666;
      transition: all 0.15s; user-select: none; -webkit-user-select: none;
    }
    .toggle-chip.on { border-color: #ff6b35; background: rgba(255,107,53,0.15); color: #ff6b35; }
    .toggle-chip.na-on { border-color: #aaa; background: rgba(200,200,200,0.1); color: #ccc; }
    .na-display { font-size: 42px; font-weight: 800; letter-spacing: -1px; line-height: 1; color: #aaa; }

    /* ── Delete Action Sheet ── */
    .action-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 1000;
      display: flex; align-items: flex-end; padding: 16px;
      opacity: 0; transition: opacity 0.2s; pointer-events: none;
    }
    .action-overlay.show { opacity: 1; pointer-events: all; }
    .action-sheet {
      background: #1c1c1c; border-radius: 18px; width: 100%; overflow: hidden;
      transform: translateY(40px); transition: transform 0.25s ease;
    }
    .action-overlay.show .action-sheet { transform: translateY(0); }
    .action-sheet-title { padding: 16px 18px 10px; font-size: 13px; color: #555; text-align: center; }
    .action-btn {
      display: block; width: 100%; padding: 16px 18px; text-align: center;
      font-size: 17px; font-weight: 600; background: none; border: none; cursor: pointer;
      border-top: 1px solid #2a2a2a; color: #fff;
    }
    .action-btn.danger { color: #ff4444; }
    .action-btn.cancel { color: #888; font-weight: 400; margin-top: 8px; background: #151515; border-radius: 14px; border: none; }

    /* ── Setup Banner ── */
    .setup-banner {
      background: #1a1500; border: 1.5px solid #ffb300; border-radius: 14px;
      padding: 16px; margin-bottom: 20px;
    }
    .setup-banner .sb-title { font-size: 14px; font-weight: 700; color: #ffb300; margin-bottom: 6px; }
    .setup-banner .sb-body { font-size: 13px; color: #aaa; line-height: 1.5; }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
      background: #333; color: #fff; padding: 11px 20px; border-radius: 24px;
      font-size: 14px; font-weight: 500; z-index: 999; white-space: nowrap;
      opacity: 0; transition: opacity 0.25s; pointer-events: none; max-width: 85vw;
    }
    .toast.show { opacity: 1; }

    /* ── Loading ── */
    .loading-state { display: flex; align-items: center; gap: 12px; color: #555; padding: 40px 0; justify-content: center; }
    .spinner { width: 20px; height: 20px; border: 2.5px solid #333; border-top-color: #ff6b35; border-radius: 50%; animation: spin 0.75s linear infinite; flex-shrink: 0; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Empty state ── */
    .empty { text-align: center; color: #444; padding: 48px 16px; font-size: 15px; }
    .empty .icon { font-size: 40px; margin-bottom: 12px; }

    /* ── Divider ── */
    .divider { height: 1px; background: #1e1e1e; margin: 16px 0; }

    /* ── Finish view ── */
    .finish-icon { font-size: 64px; text-align: center; margin-bottom: 12px; }
    .finish-title { font-size: 26px; font-weight: 800; text-align: center; margin-bottom: 4px; }
    .finish-sub { font-size: 15px; color: #666; text-align: center; margin-bottom: 28px; }
    .section-title { font-size: 11px; color: #555; text-transform: uppercase; letter-spacing: 0.8px; font-weight: 700; margin-bottom: 12px; }
  </style>
</head>
