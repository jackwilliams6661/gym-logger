<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Training Dashboard</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0c1118; --surface: #141b23; --border: #1e2733;
      --accent: #10b981; --accent2: #34d399; --text: #e2e8f0;
      --muted: #64748b; --yellow: #f59e0b; --red: #f87171;
    }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; padding: 24px; }
    header { margin-bottom: 28px; }
    header h1 { font-size: 1.6rem; font-weight: 700; }
    header p  { color: var(--muted); font-size: 0.85rem; margin-top: 4px; }
    .kpi-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 14px; margin-bottom: 28px; }
    .kpi { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 18px 20px; }
    .kpi-label { font-size: 0.72rem; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 6px; }
    .kpi-value { font-size: 1.8rem; font-weight: 700; color: var(--accent2); line-height: 1; }
    .kpi-sub   { font-size: 0.78rem; color: var(--muted); margin-top: 6px; }
    .charts-row { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; margin-bottom: 20px; }
    @media (max-width: 680px) { .charts-row { grid-template-columns: 1fr; } }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 20px; }
    .card-title { font-size: 0.78rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 16px; }
    .chart-wrap { position: relative; height: 260px; }
    .donut-wrap { position: relative; height: 260px; }
    .session-list { display: flex; flex-direction: column; gap: 10px; }
    .session-item { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; display: flex; align-items: center; gap: 14px; }
    .session-date { font-size: 0.78rem; color: var(--muted); min-width: 70px; }
    .session-name { font-size: 0.9rem; font-weight: 500; flex: 1; }
    .session-mgs  { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 4px; }
    .mg-tag { font-size: 0.72rem; border-radius: 4px; padding: 2px 7px; }
    .sets-badge { font-size: 0.78rem; color: var(--muted); white-space: nowrap; }
    .loading { display: flex; align-items: center; justify-content: center; height: 160px; color: var(--muted); font-size: 0.9rem; gap: 10px; }
    .spinner { width: 18px; height: 18px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .err { color: var(--red); padding: 20px; text-align: center; font-size: 0.9rem; }
  </style>
</head>
<body>
  <header>
    <h1>🏋️ Training Dashboard</h1>
    <p id="subtitle">Loading from Notion…</p>
  </header>

  <div class="kpi-row" id="kpis">
    <div class="loading"><span class="spinner"></span> Fetching data…</div>
  </div>

  <div class="charts-row">
    <div class="card">
      <div class="card-title">Sessions per Week</div>
      <div class="chart-wrap"><canvas id="weeklyChart"></canvas></div>
    </div>
    <div class="card">
      <div class="card-title">Muscle Groups (workouts)</div>
      <div class="donut-wrap"><canvas id="donutChart"></canvas></div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Recent Sessions</div>
    <div id="sessionList" class="session-list">
      <div class="loading"><span class="spinner"></span></div>
    </div>
  </div>

  <script>
    const API = '/api/notion?action=dashboard-training';

    const MG_COLOR_MAP = {
      'Chest':        '#f43f5e',
      'Back':         '#10b981',
      'Shoulders':    '#f59e0b',
      'Biceps':       '#ec4899',
      'Triceps':      '#8b5cf6',
      'Arms':         '#fb7185',
      'Legs':         '#3b82f6',
      'Quadriceps':   '#60a5fa',
      'Hamstrings':   '#06b6d4',
      'Calves':       '#14b8a6',
      'Glutes':       '#f97316',
      'Abs':          '#eab308',
      'Core':         '#facc15',
      'Lower Back':   '#a78bfa',
      'Traps':        '#fb923c',
      'BW Hold':      '#64748b',
    };
    const MG_FALLBACK = [
      '#f43f5e','#10b981','#f59e0b','#3b82f6','#8b5cf6',
      '#06b6d4','#f97316','#ec4899','#14b8a6','#eab308',
      '#a78bfa','#fb923c','#60a5fa','#34d399','#fb7185',
    ];
    const _mgFallbackUsed = {};
    function mgColor(name) {
      if (MG_COLOR_MAP[name]) return MG_COLOR_MAP[name];
      if (!_mgFallbackUsed[name]) {
        const idx = Object.keys(_mgFallbackUsed).length % MG_FALLBACK.length;
        _mgFallbackUsed[name] = MG_FALLBACK[idx];
      }
      return _mgFallbackUsed[name];
    }
    function MG_COLORS(labels) { return labels.map(l => mgColor(l)); }

    const fmtDate = d => new Date(d + 'T00:00:00').toLocaleDateString('en-AU', { day: 'numeric', month: 'short' });

    function renderKPIs({ totalWorkouts, weeklySessions, recentSessions }) {
      const avgPerWeek = weeklySessions.length > 0
        ? (weeklySessions.reduce((s, w) => s + w.count, 0) / weeklySessions.length).toFixed(1)
        : '—';
      const thisWeek = weeklySessions.length > 0 ? weeklySessions[weeklySessions.length - 1].count : 0;
      const totalSets = recentSessions.reduce((s, r) => s + r.setCount, 0);
      document.getElementById('kpis').innerHTML = `
        <div class="kpi"><div class="kpi-label">Workouts (8 wks)</div><div class="kpi-value">${totalWorkouts}</div><div class="kpi-sub">logged sessions</div></div>
        <div class="kpi"><div class="kpi-label">Avg / Week</div><div class="kpi-value">${avgPerWeek}</div><div class="kpi-sub">over ${weeklySessions.length} weeks</div></div>
        <div class="kpi"><div class="kpi-label">This Week</div><div class="kpi-value">${thisWeek}</div><div class="kpi-sub">sessions so far</div></div>
        <div class="kpi"><div class="kpi-label">Sets (recent)</div><div class="kpi-value">${totalSets}</div><div class="kpi-sub">across ${recentSessions.length} sessions</div></div>`;
    }

    function renderWeeklyChart({ weeklySessions }) {
      new Chart(document.getElementById('weeklyChart'), {
        type: 'bar',
        data: {
          labels: weeklySessions.map(w => w.label),
          datasets: [{ data: weeklySessions.map(w => w.count), backgroundColor: weeklySessions.map((_, i) => i === weeklySessions.length - 1 ? '#10b981' : 'rgba(16,185,129,0.35)'), borderColor: weeklySessions.map((_, i) => i === weeklySessions.length - 1 ? '#34d399' : 'rgba(16,185,129,0.5)'), borderWidth: 1, borderRadius: 5 }],
        },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false }, tooltip: { backgroundColor: '#1a2332', borderColor: '#1e2733', borderWidth: 1, titleColor: '#e2e8f0', bodyColor: '#64748b', callbacks: { label: c => ` ${c.raw} session${c.raw !== 1 ? 's' : ''}` } } }, scales: { x: { ticks: { color: '#64748b', maxRotation: 0 }, grid: { color: '#1e2733' } }, y: { ticks: { color: '#64748b', stepSize: 1 }, grid: { color: '#1e2733' }, min: 0 } } },
      });
    }

    function renderDonutChart({ muscleGroupBreakdown }) {
      const top = muscleGroupBreakdown.slice(0, 10);
      new Chart(document.getElementById('donutChart'), {
        type: 'doughnut',
        data: { labels: top.map(m => m.name), datasets: [{ data: top.map(m => m.count), backgroundColor: MG_COLORS(top.map(m => m.name)), borderColor: '#141b23', borderWidth: 2, hoverOffset: 6 }] },
        options: { responsive: true, maintainAspectRatio: false, cutout: '62%', plugins: { legend: { position: 'right', labels: { color: '#94a3b8', boxWidth: 12, font: { size: 11 }, padding: 10 } }, tooltip: { backgroundColor: '#1a2332', borderColor: '#1e2733', borderWidth: 1, titleColor: '#e2e8f0', bodyColor: '#64748b', callbacks: { label: c => ` ${c.label}: ${c.raw} workout${c.raw !== 1 ? 's' : ''}` } } } },
      });
    }

    function renderSessions({ recentSessions }) {
      if (!recentSessions.length) { document.getElementById('sessionList').innerHTML = '<p class="err">No recent sessions found.</p>'; return; }
      document.getElementById('sessionList').innerHTML = recentSessions.map(s => `
        <div class="session-item">
          <div class="session-date">${fmtDate(s.date)}</div>
          <div style="flex:1">
            <div class="session-name">${s.name}</div>
            <div class="session-mgs">${s.muscleGroups.map(mg => { const c = mgColor(mg); return `<span class="mg-tag" style="background:${c}22;color:${c};border:1px solid ${c}44">${mg}</span>`; }).join('')}</div>
          </div>
          <div class="sets-badge">${s.setCount} set${s.setCount !== 1 ? 's' : ''}</div>
        </div>`).join('');
    }

    async function init() {
      try {
        const res = await fetch(API);
        if (!res.ok) throw new Error(`API ${res.status}`);
        const data = await res.json();
        document.getElementById('subtitle').textContent = `Last 8 weeks · ${data.totalWorkouts} sessions logged`;
        renderKPIs(data); renderWeeklyChart(data); renderDonutChart(data); renderSessions(data);
      } catch (err) {
        document.getElementById('kpis').innerHTML = `<p class="err">Failed to load: ${err.message}</p>`;
        document.getElementById('sessionList').innerHTML = '';
      }
    }
    init();
  </script>
</body>
</html>
